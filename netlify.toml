[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/send-lead"
  to = "/.netlify/functions/send-lead"
  status = 200

[[redirects]]
  from = "/ask-sand"
  to = "/ask-sand.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
